<!-- @dsCard group="Colors" viewport="700x150" subtitle="Colorblind-safe series; orange #d55e00 is the universal hover/highlight" name="Chart palette" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--soft); padding: 16px; }
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
  .sw { border: 1px solid var(--line); border-radius: 8px; height: 64px; }
  .lbl { display: grid; gap: 1px; margin-top: 6px; font-size: 11px; }
  .lbl strong { font-weight: 720; }
  .lbl code { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head>
<body>
  <div class="row">
    <div><div class="sw" style="background:var(--chart-1)"></div><p class="lbl"><strong>chart-1</strong><code>#005ab5</code></p></div>
    <div><div class="sw" style="background:var(--chart-2)"></div><p class="lbl"><strong>chart-2 · hover</strong><code>#d55e00</code></p></div>
    <div><div class="sw" style="background:var(--chart-3)"></div><p class="lbl"><strong>chart-3</strong><code>#009e73</code></p></div>
    <div><div class="sw" style="background:var(--chart-4)"></div><p class="lbl"><strong>chart-4</strong><code>#7b3294</code></p></div>
    <div><div class="sw" style="background:var(--chart-5)"></div><p class="lbl"><strong>chart-5</strong><code>#b35c00</code></p></div>
    <div><div class="sw" style="background:var(--chart-6)"></div><p class="lbl"><strong>chart-6</strong><code>#4b5563</code></p></div>
    <div><div class="sw" style="background:var(--chart-track)"></div><p class="lbl"><strong>track</strong><code>#eeeeea</code></p></div>
  </div>
</body></html>
