<!-- @dsCard group="Type" viewport="700x230" subtitle="Rethink Sans, weight 720 across all heading levels" name="Headings" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--paper); padding: 18px 20px; }
  .spec { display: grid; grid-template-columns: 150px 1fr; gap: 4px 16px; align-items: baseline; }
  .m { color: var(--muted); font-size: 11px; font-family: var(--font-mono); }
  h1, h2, h3, h4 { margin: 0; font-weight: 720; letter-spacing: 0; }
  h1 { font-size: 2.6rem; line-height: 1; }
  h2 { font-size: 1.8rem; line-height: 1.2; }
  h3 { font-size: 1.4rem; line-height: 1.2; }
  h4 { font-size: 1rem; font-weight: 700; }
</style></head>
<body>
  <div class="spec">
    <span class="m">hero 4rem→2.6 · 720</span><h1>Dashboard Copilot</h1>
    <span class="m">section 1.8rem · 720</span><h2>Review Data Profiling</h2>
    <span class="m">panel 1.4rem · 720</span><h3>Automated Data Cleaning</h3>
    <span class="m">card 1rem · 700</span><h4>Needs assessment dataset</h4>
  </div>
</body></html>
