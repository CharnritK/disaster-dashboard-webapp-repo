<!-- @dsCard group="Type" viewport="700x200" subtitle="Teal uppercase eyebrows + the heavy variable-weight ramp (560–820)" name="Eyebrow & weights" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--paper); padding: 18px 20px; display: grid; gap: 14px; }
  .eyebrow { color: var(--accent); font-size: 0.75rem; font-weight: 800; letter-spacing: 0; margin: 0; text-transform: uppercase; }
  .head { margin: 2px 0 0; font-size: 1.4rem; font-weight: 720; }
  .ramp { display: flex; gap: 18px; flex-wrap: wrap; align-items: baseline; }
  .ramp span { font-size: 1.05rem; }
  .ramp i { display: block; font-style: normal; color: var(--muted); font-size: 10px; font-family: var(--font-mono); margin-top: 2px; }
</style></head>
<body>
  <div>
    <p class="eyebrow">Step 4</p>
    <h3 class="head">Review before combining files</h3>
  </div>
  <div class="ramp">
    <span style="font-weight:400">Aa 400<i>body</i></span>
    <span style="font-weight:560">Aa 560<i>medium</i></span>
    <span style="font-weight:650">Aa 650<i>summary</i></span>
    <span style="font-weight:700">Aa 700<i>bold</i></span>
    <span style="font-weight:720">Aa 720<i>headings</i></span>
    <span style="font-weight:760">Aa 760<i>strong</i></span>
    <span style="font-weight:780">Aa 780<i>pills</i></span>
    <span style="font-weight:800">Aa 800<i>eyebrow</i></span>
  </div>
</body></html>
