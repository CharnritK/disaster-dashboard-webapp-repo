<!-- @dsCard group="Components" viewport="700x220" subtitle="Sticky glass header + the 7-step workflow stepper" name="Navigation" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../ds-fallback-loader.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--bg-graph-paper); margin: 0; }</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
(async () => {
const NS = await window.__dsLoadNamespace({ detect: ["AppHeader", "Stepper"] });
const { AppHeader, Stepper, ToggleSwitch, LoadingBanner } = NS;

function Demo() {
  const [ai, setAi] = React.useState(true);
  const [step, setStep] = React.useState(2);
  return (
    <div>
      <AppHeader sticky={false} links={[{ label: "About", href: "#" }]}>
        <ToggleSwitch label="AI" checked={ai} onChange={setAi} />
      </AppHeader>
      <div style={{ padding: "20px 24px", display: "grid", gap: 16 }}>
        <Stepper
          steps={["Template", "Upload", "Profile", "Harmonize", "Dataset", "Dashboard", "Export"]}
          currentIndex={step}
          onNavigate={setStep}
          canNavigateTo={(index) => index <= 3}
        />
        <LoadingBanner />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
})();
</script>
</body></html>
