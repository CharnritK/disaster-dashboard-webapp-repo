<!-- @dsCard group="Components" viewport="700x460" subtitle="Dialog over ink scrim, bordered header, text Close button" name="Modal" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../ds-fallback-loader.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--soft); margin: 0; padding: 16px; min-height: 440px; }</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
(async () => {
const NS = await window.__dsLoadNamespace({ detect: ["Modal", "Pill"] });
const { Modal, Pill, InlineCode } = NS;

function Node({ eyebrow, title, children }) {
  return (
    <div style={{ background: "var(--panel)", border: "1px solid var(--line)", borderRadius: 8, display: "grid", gap: 8, padding: 14 }}>
      <span style={{ color: "var(--accent)", fontSize: "0.74rem", fontWeight: 800, textTransform: "uppercase" }}>{eyebrow}</span>
      <strong style={{ fontSize: "1rem", lineHeight: 1.35 }}>{title}</strong>
      {children}
    </div>
  );
}

function Demo() {
  return (
    <Modal
      title="How this decision maps to data"
      description="Signals, datasets, and caveats feeding the flood-response brief."
      maxWidth="560px"
      onClose={() => {}}
    >
      <Node eyebrow="Decision" title="Where should water and shelter support go first?">
        <span style={{ color: "var(--muted)", fontSize: "0.9rem" }}>Owner: response coordination cell. Horizon: next 72 hours.</span>
      </Node>
      <Node eyebrow="Primary signal" title="Need severity by district">
        <span style={{ color: "var(--muted)", fontSize: "0.9rem" }}>
          Computed from <InlineCode>need_severity_score</InlineCode> in <InlineCode>needs_assessment.csv</InlineCode>, joined to population baselines.
        </span>
        <div style={{ display: "flex", gap: 8 }}>
          <Pill tone="accent" uppercase>covered</Pill>
          <Pill tone="panel">96% match rate</Pill>
        </div>
      </Node>
    </Modal>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
})();
</script>
</body></html>
