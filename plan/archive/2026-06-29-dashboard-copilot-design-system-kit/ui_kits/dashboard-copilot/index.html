<!-- @dsCard group="Dashboard Copilot" viewport="1240x780" subtitle="Interactive 7-step workflow click-through" name="Workflow app" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Copilot — UI kit</title>
<link rel="icon" href="../../assets/logo.svg">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
// In hidden documents (background tabs, capture iframes) CSS transitions and
// animations never advance, freezing styles at stale values. Disable them
// while hidden so captures reflect final state; restore when visible.
(function () {
  const style = document.createElement("style");
  style.textContent = "*, *::before, *::after { transition: none !important; }";
  function sync() {
    if (document.visibilityState === "hidden") {
      if (!style.parentNode) document.head.appendChild(style);
    } else if (style.parentNode) {
      style.parentNode.removeChild(style);
    }
  }
  sync();
  document.addEventListener("visibilitychange", sync);
})();
</script>
<script>
// Optional: the compiled design-system bundle. The loader below falls back to
// compiling the source .jsx modules in the browser when it is absent.
(function () {
  const script = document.createElement("script");
  script.src = "../../_ds_bundle.js";
  script.onerror = function () { window.__dsBundleMissing = true; };
  document.head.appendChild(script);
})();
</script>
</head>
<body>
<div id="root"></div>
<script>
window.__loadKitNamespace = async function () {
  // Wait for the (dynamically injected) bundle script to settle
  if (document.readyState !== "complete") {
    await new Promise((resolve) => window.addEventListener("load", resolve, { once: true }));
  }
  // 1) Prefer the compiled bundle's namespace
  for (const key of Object.keys(window)) {
    let value;
    try {
      value = window[key];
      if (value && typeof value === "object" && value.WorkflowApp && value.Stepper) return value;
    } catch (error) { /* cross-origin frame — skip */ }
  }
  // 2) Fallback: fetch + transform the source modules with Babel
  const files = [
    "../../components/actions/Button.jsx",
    "../../components/actions/ToggleSwitch.jsx",
    "../../components/forms/Field.jsx",
    "../../components/forms/TextAreaField.jsx",
    "../../components/forms/SelectField.jsx",
    "../../components/forms/CheckboxRow.jsx",
    "../../components/navigation/AppHeader.jsx",
    "../../components/navigation/Stepper.jsx",
    "../../components/feedback/Notice.jsx",
    "../../components/feedback/LoadingBanner.jsx",
    "../../components/feedback/Pill.jsx",
    "../../components/feedback/SeverityCallout.jsx",
    "../../components/surfaces/Card.jsx",
    "../../components/surfaces/SectionHeading.jsx",
    "../../components/surfaces/RecommendationCard.jsx",
    "../../components/surfaces/Accordion.jsx",
    "../../components/data/Metric.jsx",
    "../../components/data/BarChart.jsx",
    "../../components/data/DataTable.jsx",
    "./KitData.jsx",
    "./BriefStep.jsx",
    "./UploadStep.jsx",
    "./ProfileStep.jsx",
    "./RecommendStep.jsx",
    "./ReadinessPanel.jsx",
    "./ValidateStep.jsx",
    "./DashboardScreen.jsx",
    "./ExportStep.jsx",
    "./WorkflowApp.jsx",
  ];
  const sources = await Promise.all(
    files.map(async (rel) => {
      const url = new URL(rel, window.location.href).href;
      const response = await fetch(url);
      if (!response.ok) throw new Error("Failed to load " + rel);
      return { url, text: await response.text() };
    })
  );
  const byUrl = {};
  sources.forEach((source) => { byUrl[source.url] = source; });
  const registry = {};
  function evaluate(url) {
    if (registry[url]) return registry[url].exports;
    const source = byUrl[url];
    if (!source) throw new Error("Module not found: " + url);
    const module = { exports: {} };
    registry[url] = module;
    const compiled = Babel.transform(source.text, { presets: ["react", "env"], filename: url }).code;
    const requireShim = (spec) => {
      if (spec === "react") return window.React;
      if (spec === "react-dom") return window.ReactDOM;
      return evaluate(new URL(spec, url).href);
    };
    new Function("require", "module", "exports", compiled)(requireShim, module, module.exports);
    return module.exports;
  }
  const namespace = {};
  sources.forEach((source) => { Object.assign(namespace, evaluate(source.url)); });
  return namespace;
};
</script>
<script type="text/babel">
(async function () {
  try {
    const NS = await window.__loadKitNamespace();
    const { WorkflowApp } = NS;
    ReactDOM.createRoot(document.getElementById("root")).render(<WorkflowApp />);
  } catch (error) {
    document.getElementById("root").innerHTML =
      '<div style="padding:40px"><strong>Could not load the UI kit.</strong><p style="color:#5f656d">' +
      String(error) + "</p></div>";
  }
})();
</script>
</body>
</html>
