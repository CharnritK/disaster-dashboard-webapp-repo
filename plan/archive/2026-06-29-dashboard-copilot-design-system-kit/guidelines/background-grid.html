<!-- @dsCard group="Brand" viewport="700x170" subtitle="Faint 72px graph-paper grid over a warm fade — the signature page background" name="Graph-paper background" -->
<!DOCTYPE html>
<html><head><link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; }
  .demo { height: 170px; background: var(--bg-graph-paper); display: grid; place-items: center; }
  .card { background: rgba(255,255,255,0.86); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow); padding: 14px 22px; font-size: 0.86rem; color: var(--muted); }
  .card strong { color: var(--ink); font-weight: 720; }
</style></head>
<body>
  <div class="demo">
    <div class="card"><strong>Panels float on the grid.</strong> 72px cells, 1px lines at ~3% ink.</div>
  </div>
</body></html>
