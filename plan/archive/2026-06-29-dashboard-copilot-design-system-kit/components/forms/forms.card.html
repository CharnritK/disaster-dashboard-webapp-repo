<!-- @dsCard group="Components" viewport="700x320" subtitle="Labeled input, select with CSS chevron, textarea, checkbox row" name="Forms" -->
<!DOCTYPE html>
<html><head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../ds-fallback-loader.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { background: var(--paper); margin: 0; padding: 16px; }</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
(async () => {
const NS = await window.__dsLoadNamespace({ detect: ["Field", "SelectField"] });
const { Field, SelectField, TextAreaField, CheckboxRow } = NS;

function Demo() {
  const [maker, setMaker] = React.useState("Provincial response coordinator");
  const [join, setJoin] = React.useState("admin_pcode");
  const [notes, setNotes] = React.useState("");
  const [ack, setAck] = React.useState(true);
  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "grid", gap: 14, gridTemplateColumns: "repeat(2, minmax(0,1fr))" }}>
        <Field label="Decision-maker" value={maker} onChange={setMaker} />
        <SelectField label="Join or ID field" value={join} onChange={setJoin}
          options={["Not selected", "admin_pcode", "district_name", "partner_org"]} />
      </div>
      <TextAreaField label="Semantic comment for the agent" rows={2} value={notes} onChange={setNotes}
        placeholder="Rows are districts; severity_score is 0-100; data came from rapid assessment round 2." />
      <CheckboxRow label="I reviewed the decision-readiness caveats before exporting." checked={ack} onChange={setAck} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
})();
</script>
</body></html>
